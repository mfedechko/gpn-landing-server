spring:
  application:
    name: gpn-leads

  # Active profile: override with -Dspring.profiles.active=prod on the server
  profiles:
    active: local

  jpa:
    hibernate:
      # 'update' is fine for dev; switch to 'validate' in prod once schema is stable
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  cors:
    allowed-origins: https://shchoglagpn.com.ua

---
# ── LOCAL profile (Docker MySQL) ─────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/gpn_leads?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: gpn_user
    password: gpn_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

---
# ── PROD profile (hosting MySQL) ─────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://YOUR_PROD_HOST:3306/gpn_leads?useSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: 8080
